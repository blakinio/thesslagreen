name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Ruff
        run: ruff check custom_components tests tools

      - name: Compile Python sources
        run: python -m compileall -q custom_components/thessla_green_modbus tests tools

      - name: Compare registers with vendor reference
        run: python tools/compare_registers_with_reference.py

      - name: Maintainability gate
        run: python tools/check_maintainability.py


  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Pytest with coverage
        run: pytest --cov --cov-report=xml --cov-report=term -q

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml

  entity-mappings:
    name: Entity mappings validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Validate entity mappings
        run: python tools/validate_entity_mappings.py
