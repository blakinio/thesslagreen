name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Ruff
        run: ruff check custom_components tests tools

      - name: Ruff import order
        run: ruff check --select I custom_components tests tools

      - name: Ruff format
        run: ruff format --check custom_components tests tools

      - name: Compile Python sources
        run: python -m compileall -q custom_components/thessla_green_modbus tests tools

      - name: Compare registers with vendor reference
        run: python tools/compare_registers_with_reference.py --show-renames

      - name: AirPack4 vendor coverage
        run: python tools/compare_airpack4_vendor_coverage.py

      - name: Check translations
        run: python tools/check_translations.py

      - name: Maintainability gate
        run: python tools/check_maintainability.py


  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Collect tests
        run: pytest --collect-only -q

      - name: Pytest with coverage
        run: pytest tests/ -q --tb=long --cov --cov-report=xml --cov-report=term

      - name: Upload coverage
        # CODECOV_TOKEN secret is optional; upload failure does not block CI.
        # Add CODECOV_TOKEN to repository secrets to enable authenticated uploads.
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          disable_search: true
          fail_ci_if_error: false

  entity-mappings:
    name: Entity mappings validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.2.3"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Validate entity mappings
        run: python tools/validate_entity_mappings.py

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
