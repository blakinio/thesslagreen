name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.1.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev]"
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Ruff (custom_components gate)
        run: ruff check custom_components/

      - name: Pyflakes (custom_components)
        run: python -m pyflakes custom_components/

      - name: Ruff (repo)
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Isort
        run: isort --check-only .

      - name: Mypy
        run: mypy .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.1.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev]"
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Pytest with coverage
        run: pytest --cov --cov-report=xml --cov-report=term -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  entity-mappings:
    name: Entity mappings validation
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.1.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev]"
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: Validate entity mappings
        run: python tools/validate_entity_mappings.py

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.1.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev]"
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: hassfest validation
        run: python -m hassfest

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
        ha-version: ["2026.1.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c constraints.txt -e ".[dev]"
          python -m pip install homeassistant==${{ matrix.ha-version }} hacs

      - name: HACS validation
        run: python -m hacs validate
