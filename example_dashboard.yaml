  # ============================================================
  # WIDOK 5 – USTAWIENIA I HARMONOGRAM
  # ============================================================
  - title: Ustawienia
    path: settings
    icon: mdi:cog
    type: sections

    sections:

      # --- Konfiguracja trybu ---
      - type: grid
