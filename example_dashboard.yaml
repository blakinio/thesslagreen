views:
  - title: Przegląd
    path: overview
    icon: mdi:home-thermometer-outline
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Stan systemu
          - type: tile
            entity: switch.rekuperator_on_off_panel_mode
            name: Zasilanie
            icon: mdi:power
            color: red
            grid_options:
              columns: 6
              rows: 2
          - type: tile
            entity: select.rekuperator_mode
            name: Tryb pracy
            grid_options:
              columns: 6
              rows: 2
          - type: tile
            entity: select.rekuperator_season_mode
            name: Sezon
            icon: mdi:weather-partly-cloudy
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_bypass_mode
            name: Bypass
            icon: mdi:pipe-valve
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_gwc_mode
            name: GWC
            icon: mdi:heat-wave
            grid_options:
              columns: 4
      - type: grid
        cards:
          - type: heading
            heading: Temperatury
          - type: gauge
            entity: sensor.rekuperator_outside_temperature
            name: Zewnętrzna
            min: -25
            max: 40
            needle: true
            severity:
              green: 10
              yellow: 0
              red: -25
            grid_options:
              columns: 4
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_supply_temperature
            name: Nawiew
            min: 5
            max: 50
            needle: true
            severity:
              green: 18
              yellow: 12
              red: 5
            grid_options:
              columns: 4
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_exhaust_temperature
            name: Wywiew
            min: 10
            max: 35
            needle: true
            severity:
              green: 20
              yellow: 18
              red: 10
            grid_options:
              columns: 4
              rows: 3
          - type: history-graph
            title: Temperatury – ostatnie 6h
            hours_to_show: 6
            entities:
              - entity: sensor.rekuperator_outside_temperature
                name: Zewnętrzna
              - entity: sensor.rekuperator_supply_temperature
                name: Nawiew
              - entity: sensor.rekuperator_exhaust_temperature
                name: Wywiew
            grid_options:
              columns: 12
              rows: 4
      - type: grid
        cards:
          - type: heading
            heading: Intensywność wentylacji
          - type: gauge
            entity: sensor.rekuperator_supply_percentage
            name: Nawiew
            unit: '%'
            min: 0
            max: 100
            needle: true
            severity:
              green: 30
              yellow: 80
              red: 95
            grid_options:
              columns: 4
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_exhaust_percentage
            name: Wywiew
            unit: '%'
            min: 0
            max: 100
            needle: true
            severity:
              green: 30
              yellow: 80
              red: 95
            grid_options:
              columns: 4
              rows: 3
          - type: tile
            entity: sensor.rekuperator_supply_air_flow
            name: Nawiew
            icon: mdi:weather-windy
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_exhaust_air_flow
            name: Wywiew
            icon: mdi:weather-windy
            grid_options:
              columns: 4
          - type: history-graph
            title: Przepływ – ostatnie 6h
            hours_to_show: 6
            entities:
              - entity: sensor.rekuperator_supply_percentage
                name: Nawiew %
              - entity: sensor.rekuperator_exhaust_percentage
                name: Wywiew %
            grid_options:
              columns: 12
              rows: 4
      - type: grid
        cards:
          - type: heading
            heading: Tryby specjalne
          - type: tile
            entity: switch.rekuperator_boost
            name: Turbo
            icon: mdi:rocket-launch
            color: deep-orange
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_eco
            name: Eco
            icon: mdi:leaf
            color: green
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_away
            name: Nieobecność
            icon: mdi:airplane
            color: blue
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_sleep
            name: Sen
            icon: mdi:weather-night
            color: indigo
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_fireplace
            name: Kominek
            icon: mdi:fireplace
            color: orange
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_hood
            name: Okap
            icon: mdi:range-hood
            color: amber
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_party
            name: Impreza
            icon: mdi:party-popper
            color: pink
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_bathroom
            name: Łazienka
            icon: mdi:shower
            color: cyan
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_kitchen
            name: Kuchnia
            icon: mdi:chef-hat
            color: teal
            grid_options:
              columns: 3
          - type: tile
            entity: switch.rekuperator_comfort_mode
            name: Komfort
            icon: mdi:sofa
            color: purple
            grid_options:
              columns: 3
      - type: grid
        cards:
          - type: heading
            heading: Alarmy i filtry
          - type: tile
            entity: binary_sensor.rekuperator_e_alarm
            name: Alarm E
            icon: mdi:alert-circle
            color: red
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_s_error
            name: Błąd S
            icon: mdi:alert
            color: orange
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_fire_alarm
            name: P.POŻ.
            icon: mdi:fire-alert
            color: red
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_ahu_filter_overflow
            name: Filtr nawiewu
            icon: mdi:filter-alert
            color: yellow
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_duct_filter_overflow
            name: Filtr kanałowy
            icon: mdi:filter-alert
            color: yellow
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_ahu_stop_alarm_code
            name: Kod zatrzymania
            icon: mdi:information-outline
            grid_options:
              columns: 4
  - title: Klimat
    path: climate
    icon: mdi:thermometer-lines
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sterowanie
          - type: tile
            entity: climate.rekuperator_climate_control
            name: Klimatyzacja
            features:
              - type: climate-hvac-modes
              - type: target-temperature
            grid_options:
              columns: 12
              rows: 3
          - type: tile
            entity: sensor.rekuperator_required_temperature
            name: Temperatura zadana
            icon: mdi:thermometer-chevron-up
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_antifreeze_stage
            name: Antyzamrożenie (FPX)
            icon: mdi:snowflake-thermometer
            grid_options:
              columns: 6
          - type: tile
            entity: number.rekuperator_supply_air_temperature_manual
            name: Nawiew – nastawa ręczna
            icon: mdi:thermometer-plus
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_comfort_mode_status
            name: Status komfort
            icon: mdi:home-heart
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Temperatury
          - type: tile
            entity: sensor.rekuperator_outside_temperature
            name: Zewnętrzna (TZ1)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_supply_temperature
            name: Nawiewna (TN1)
            icon: mdi:thermometer-chevron-up
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_exhaust_temperature
            name: Wywiewna (TP)
            icon: mdi:thermometer-chevron-down
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_duct_supply_temperature
            name: Za nagrzewnicą (TN2)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_fpx_temperature
            name: Za FPX (TZ2)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_gwc_temperature
            name: Przed GWC (TZ3)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_ambient_temperature
            name: Otoczenia (TO)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_heating_temperature
            name: Nagrzewnica (TH)
            icon: mdi:thermometer-high
            grid_options:
              columns: 4
          - type: history-graph
            title: Historia temperatur – 24h
            hours_to_show: 24
            entities:
              - entity: sensor.rekuperator_outside_temperature
                name: Zewnętrzna
              - entity: sensor.rekuperator_supply_temperature
                name: Nawiew
              - entity: sensor.rekuperator_exhaust_temperature
                name: Wywiew
              - entity: sensor.rekuperator_duct_supply_temperature
                name: Za nagrzewnicą
            grid_options:
              columns: 12
              rows: 5
          - type: statistics-graph
            title: Temperatury – ostatnie 7 dni
            entities:
              - entity: sensor.rekuperator_outside_temperature
                name: Zewnętrzna
              - entity: sensor.rekuperator_supply_temperature
                name: Nawiew
              - entity: sensor.rekuperator_exhaust_temperature
                name: Wywiew
            stat_types:
              - mean
              - min
              - max
            days_to_show: 7
            grid_options:
              columns: 12
              rows: 5
      - type: grid
        cards:
          - type: heading
            heading: Bypass (obejście wymiennika)
          - type: tile
            entity: sensor.rekuperator_bypass_mode
            name: Aktualny status bypass
            icon: mdi:pipe-valve
            grid_options:
              columns: 6
          - type: tile
            entity: select.rekuperator_bypass_user_mode
            name: Tryb bypass
            icon: mdi:tune
            grid_options:
              columns: 6
          - type: tile
            entity: switch.rekuperator_bypass_active
            name: Zablokuj bypass
            icon: mdi:pipe-off
            color: orange
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_minimum_bypass_temperature
            name: Min. temp. bypass (odczyt)
            icon: mdi:thermometer-minus
            grid_options:
              columns: 6
          - type: tile
            entity: number.rekuperator_bypass_temperature_free_heating
            name: Próg Free Heating
            icon: mdi:sun-thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: number.rekuperator_bypass_temperature_free_cooling
            name: Próg Free Cooling
            icon: mdi:snowflake
            grid_options:
              columns: 4
          - type: tile
            entity: number.rekuperator_bypass_coef_2
            name: Intensywność nawiewu – bypass tryb 2/3
            icon: mdi:percent
            grid_options:
              columns: 4
      - type: grid
        cards:
          - type: heading
            heading: Nagrzewnica / Chłodnica
          - type: gauge
            entity: sensor.rekuperator_heater_voltage
            name: Sygnał nagrzewnicy
            min: 0
            max: 10
            needle: true
            unit: V
            severity:
              green: 0
              yellow: 5
              red: 8
            grid_options:
              columns: 6
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_cooler_voltage
            name: Sygnał chłodnicy
            min: 0
            max: 10
            needle: true
            unit: V
            severity:
              green: 0
              yellow: 5
              red: 8
            grid_options:
              columns: 6
              rows: 3
          - type: tile
            entity: binary_sensor.rekuperator_duct_heater_protection
            name: Zabezpieczenie termiczne nagrzewnicy
            icon: mdi:thermometer-alert
            color: orange
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_cfg_post_heater_mode
            name: Tryb ERV (dogrzewacz wtórny)
            icon: mdi:heat-wave
            grid_options:
              columns: 6
  - title: Wentylacja
    path: ventilation
    icon: mdi:fan
    type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Sterowanie wentylacją
          - type: tile
            entity: fan.rekuperator_ventilation
            name: Wentylacja
            features:
              - type: fan-speed
            grid_options:
              columns: 12
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_supply_percentage
            name: Nawiew %
            min: 0
            max: 100
            needle: true
            severity:
              green: 30
              yellow: 80
              red: 95
            grid_options:
              columns: 6
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_exhaust_percentage
            name: Wywiew %
            min: 0
            max: 100
            needle: true
            severity:
              green: 30
              yellow: 80
              red: 95
            grid_options:
              columns: 6
              rows: 3
          - type: tile
            entity: sensor.rekuperator_supply_air_flow
            name: Przepływ nawiewu (chwilowy)
            icon: mdi:weather-windy
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_exhaust_air_flow
            name: Przepływ wywiewu (chwilowy)
            icon: mdi:weather-windy
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_supply_flow_rate
            name: Zadany przepływ – nawiew
            icon: mdi:arrow-up-circle
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_exhaust_flow_rate
            name: Zadany przepływ – wywiew
            icon: mdi:arrow-down-circle
            grid_options:
              columns: 6
          - type: history-graph
            title: Przepływy – ostatnie 24h
            hours_to_show: 24
            entities:
              - entity: sensor.rekuperator_supply_air_flow
                name: Nawiew m³/h
              - entity: sensor.rekuperator_exhaust_air_flow
                name: Wywiew m³/h
            grid_options:
              columns: 12
              rows: 4
      - type: grid
        cards:
          - type: heading
            heading: Nastawy przepływu
          - type: tile
            entity: number.rekuperator_air_flow_rate_manual
            name: Intensywność – ręczna
            icon: mdi:tune
            grid_options:
              columns: 6
          - type: tile
            entity: sensor.rekuperator_minimum_percentage
            name: Minimum %
            icon: mdi:arrow-collapse-down
            grid_options:
              columns: 3
          - type: tile
            entity: sensor.rekuperator_maximum_percentage
            name: Maksimum %
            icon: mdi:arrow-collapse-up
            grid_options:
              columns: 3
          - type: tile
            entity: number.rekuperator_nominal_supply_air_flow
            name: Nom. nawiew [m³/h]
            icon: mdi:air-filter
            grid_options:
              columns: 6
          - type: tile
            entity: number.rekuperator_nominal_exhaust_air_flow
            name: Nom. wywiew [m³/h]
            icon: mdi:air-filter
            grid_options:
              columns: 6
      - type: grid
        cards:
          - type: heading
            heading: Sygnały sterujące (PWM)
          - type: gauge
            entity: sensor.rekuperator_supply_fan_voltage
            name: Wentylator nawiewny
            min: 0
            max: 10
            needle: true
            unit: V
            severity:
              green: 2
              yellow: 7
              red: 9
            grid_options:
              columns: 6
              rows: 3
          - type: gauge
            entity: sensor.rekuperator_exhaust_fan_voltage
            name: Wentylator wywiewny
            min: 0
            max: 10
            needle: true
            unit: V
            severity:
              green: 2
              yellow: 7
              red: 9
            grid_options:
              columns: 6
              rows: 3
          - type: history-graph
            title: PWM wentylatorów – 6h
            hours_to_show: 6
            entities:
              - entity: sensor.rekuperator_supply_fan_voltage
                name: Nawiew PWM
              - entity: sensor.rekuperator_exhaust_fan_voltage
                name: Wywiew PWM
              - entity: sensor.rekuperator_heater_voltage
                name: Nagrzewnica PWM
            grid_options:
              columns: 12
              rows: 4
      - type: grid
        cards:
          - type: heading
            heading: GWC – Gruntowy Wymiennik Ciepła
          - type: tile
            entity: sensor.rekuperator_gwc_mode
            name: Status GWC
            icon: mdi:heat-wave
            grid_options:
              columns: 4
          - type: tile
            entity: switch.rekuperator_gwc_active
            name: Zablokuj GWC
            icon: mdi:pipe-off
            color: orange
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_gwc_regeneration_active
            name: Regeneracja aktywna
            icon: mdi:restore
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_gwc_temperature
            name: Temperatura GWC (TZ3)
            icon: mdi:thermometer
            grid_options:
              columns: 4
          - type: tile
            entity: select.rekuperator_gwc_regeneration
            name: Typ regeneracji
            icon: mdi:autorenew
            grid_options:
              columns: 4
          - type: tile
            entity: number.rekuperator_gwc_activation_temperature_differential
            name: Delta T regeneracji
            icon: mdi:delta
            grid_options:
              columns: 4
          - type: tile
            entity: number.rekuperator_min_gwc_air_temperature
            name: Min. temp. GWC
            icon: mdi:thermometer-minus
            grid_options:
              columns: 4
          - type: tile
            entity: number.rekuperator_max_gwc_air_temperature
            name: Maks. temp. GWC
            icon: mdi:thermometer-plus
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_start_gwc_regen_summer_time
            name: Start regeneracji – lato
            icon: mdi:clock-start
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_stop_gwc_regen_summer_time
            name: Stop regeneracji – lato
            icon: mdi:clock-end
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_start_gwc_regen_winter_time
            name: Start regeneracji – zima
            icon: mdi:clock-start
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_stop_gwc_regen_winter_time
            name: Stop regeneracji – zima
            icon: mdi:clock-end
            grid_options:
              columns: 4
