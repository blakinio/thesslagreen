# ============================================================
# Dashboard Thessla Green / AirPack4 – Home Assistant 2026
# ============================================================
# Prefix encji zależy od nazwy urządzenia nadanej podczas
# konfiguracji. Ten plik zakłada nazwę "Rekuperator".
# Jeśli Twoje encje mają inny prefix, zamień "rekuperator_"
# na właściwy (np. "airpack_") za pomocą globalnego Znajdź/Zamień.
# ============================================================

views:

  # ============================================================
  # WIDOK 1 – PRZEGLĄD
  # ============================================================
  - title: Przegląd
    path: overview
    icon: mdi:home-thermometer
    type: sections

    sections:

      # --- Główne sterowanie ---
      - type: grid
        title: Sterowanie
        cards:
          - type: tile
            entity: switch.rekuperator_on_off_panel_mode
            name: Zasilanie
            icon: mdi:power
            color: red
          - type: tile
            entity: select.rekuperator_mode
            name: Tryb pracy
          - type: tile
            entity: select.rekuperator_season_mode
            name: Sezon
          - type: tile
            entity: select.rekuperator_special_mode
            name: Tryb specjalny
          - type: tile
            entity: climate.rekuperator_climate_control
            name: Klimat
          - type: tile
            entity: fan.rekuperator_ventilation
            name: Wentylacja

      # --- Kluczowe temperatury ---
      - type: grid
        title: Temperatury
        cards:
          - type: gauge
            entity: sensor.rekuperator_outside_temperature
            name: Na zewnątrz
            min: -25
            max: 45
            needle: true
            severity:
              green: 15
              yellow: 0
              red: -25
          - type: gauge
            entity: sensor.rekuperator_supply_temperature
            name: Nawiew
            min: 5
            max: 50
            needle: true
            severity:
              green: 18
              yellow: 12
              red: 5
          - type: gauge
            entity: sensor.rekuperator_exhaust_temperature
            name: Wywiew
            min: 5
            max: 35
            needle: true
            severity:
              green: 20
              yellow: 18
              red: 5
          - type: tile
            entity: sensor.rekuperator_required_temperature
            name: Zadana temperatura

      # --- Przepływy i sprawność ---
      - type: grid
        title: Wentylacja
        cards:
          - type: gauge
            entity: sensor.rekuperator_heat_recovery_efficiency
            name: Sprawność odzysku
            min: 0
            max: 100
            needle: true
            severity:
              green: 70
              yellow: 50
              red: 0
          - type: tile
            entity: sensor.rekuperator_supply_flow_rate_m3_h
            name: Nawiew
            icon: mdi:fan-plus
          - type: tile
            entity: sensor.rekuperator_exhaust_flow_rate_m3_h
            name: Wywiew
            icon: mdi:fan-minus
          - type: tile
            entity: sensor.rekuperator_heat_recovery_power
            name: Moc odzysku
          - type: tile
            entity: sensor.rekuperator_supply_percentage
            name: Nawiew %
          - type: tile
            entity: sensor.rekuperator_exhaust_percentage
            name: Wywiew %

      # --- Status aktywny ---
      - type: grid
        title: Status
        cards:
          - type: tile
            entity: sensor.rekuperator_bypass_mode_status
            name: Bypass
            icon: mdi:pipe-leak
          - type: tile
            entity: sensor.rekuperator_gwc_mode
            name: GWC
            icon: mdi:pipe
          - type: tile
            entity: sensor.rekuperator_comfort_mode_status
            name: Komfort
            icon: mdi:home-heart
          - type: tile
            entity: sensor.rekuperator_antifreez_stage
            name: Antyzamrożenie
            icon: mdi:snowflake-thermometer
          - type: tile
            entity: sensor.rekuperator_day_of_week
            name: Dzień
          - type: tile
            entity: sensor.rekuperator_time_period
            name: Odcinek

      # --- Szybkie tryby specjalne ---
      - type: grid
        title: Tryby specjalne
        cards:
          - type: tile
            entity: switch.rekuperator_boost
            name: Turbo
            icon: mdi:rocket-launch
            color: deep-orange
          - type: tile
            entity: switch.rekuperator_eco
            name: Eco
            icon: mdi:leaf
            color: green
          - type: tile
            entity: switch.rekuperator_away
            name: Nieobecność
            icon: mdi:airplane
            color: blue
          - type: tile
            entity: switch.rekuperator_sleep
            name: Sen
            icon: mdi:weather-night
            color: indigo
          - type: tile
            entity: switch.rekuperator_fireplace
            name: Kominek
            icon: mdi:fireplace
            color: orange
          - type: tile
            entity: switch.rekuperator_hood
            name: Okap
            icon: mdi:range-hood
            color: amber
          - type: tile
            entity: switch.rekuperator_party
            name: Impreza
            icon: mdi:party-popper
            color: pink
          - type: tile
            entity: switch.rekuperator_bathroom
            name: Łazienka
            icon: mdi:shower
            color: cyan
          - type: tile
            entity: switch.rekuperator_kitchen
            name: Kuchnia
            icon: mdi:chef-hat
            color: teal
          - type: tile
            entity: switch.rekuperator_comfort_mode_panel
            name: Komfort
            icon: mdi:sofa
            color: purple

      # --- Aktywne alarmy ---
      - type: grid
        title: Alarmy
        cards:
          - type: tile
            entity: binary_sensor.rekuperator_alarm
            name: Alarm E
            color: red
          - type: tile
            entity: binary_sensor.rekuperator_error
            name: Błąd S
            color: orange
          - type: tile
            entity: binary_sensor.rekuperator_fire_alarm
            name: Alarm pożarowy
            color: red
          - type: tile
            entity: binary_sensor.rekuperator_f_146
            name: Filtr nawiewu
            icon: mdi:filter-alert
            color: yellow
          - type: tile
            entity: binary_sensor.rekuperator_f_147
            name: Filtr wywiewu
            icon: mdi:filter-alert
            color: yellow
          - type: tile
            entity: sensor.rekuperator_ahu_stop_alarm_code
            name: Kod alarmu
            icon: mdi:alert-circle

  # ============================================================
  # WIDOK 2 – KLIMAT I TEMPERATURY
  # ============================================================
  - title: Klimat
    path: climate
    icon: mdi:thermometer
    type: sections

    sections:

      # --- Główna kontrola klimatu ---
      - type: grid
        title: Kontrola
        cards:
          - type: tile
            entity: climate.rekuperator_climate_control
          - type: tile
            entity: sensor.rekuperator_required_temperature
            name: Temperatura zadana
          - type: tile
            entity: number.rekuperator_supply_air_temperature_manual
            name: Nawiew – ręczny
          - type: tile
            entity: number.rekuperator_supply_air_temperature_temporary
            name: Nawiew – tymczasowy

      # --- Odczyty temperatur ---
      - type: grid
        title: Odczyty temperatur
        cards:
          - type: tile
            entity: sensor.rekuperator_outside_temperature
            name: Zewnętrzna
          - type: tile
            entity: sensor.rekuperator_supply_temperature
            name: Nawiewna
          - type: tile
            entity: sensor.rekuperator_exhaust_temperature
            name: Wywiewna
          - type: tile
            entity: sensor.rekuperator_duct_supply_temperature
            name: Kanał nawiewny
          - type: tile
            entity: sensor.rekuperator_fpx_temperature
            name: Temperatura FPX
          - type: tile
            entity: sensor.rekuperator_gwc_temperature
            name: Temperatura GWC
          - type: tile
            entity: sensor.rekuperator_ambient_temperature
            name: Otoczenia
          - type: tile
            entity: sensor.rekuperator_heating_temperature
            name: Grzewcza
          - type: tile
            entity: sensor.rekuperator_supply_air_temperature_manual
            name: Nawiew (odczyt)

      # --- Historia temperatur ---
      - type: grid
        title: Historia (24h)
        cards:
          - type: history-graph
            title: Temperatury powietrza
            hours_to_show: 24
            entities:
              - entity: sensor.rekuperator_outside_temperature
                name: Zewnętrzna
              - entity: sensor.rekuperator_supply_temperature
                name: Nawiew
              - entity: sensor.rekuperator_exhaust_temperature
                name: Wywiew
              - entity: sensor.rekuperator_duct_supply_temperature
                name: Kanał

      # --- Sprawność ---
      - type: grid
        title: Sprawność i moc
        cards:
          - type: gauge
            entity: sensor.rekuperator_heat_recovery_efficiency
            name: Sprawność odzysku ciepła
            min: 0
            max: 100
            needle: true
            severity:
              green: 70
              yellow: 50
              red: 0
          - type: tile
            entity: sensor.rekuperator_heat_recovery_power
            name: Moc odzysku
          - type: tile
            entity: sensor.rekuperator_electrical_power
            name: Pobór mocy

      # --- Bypass ---
      - type: grid
        title: Bypass (obejście)
        cards:
          - type: tile
            entity: sensor.rekuperator_bypass_mode_status
            name: Status bypass
          - type: tile
            entity: switch.rekuperator_bypass_off
            name: Bypass aktywny
          - type: tile
            entity: select.rekuperator_bypass_user_mode
            name: Tryb bypass
          - type: tile
            entity: sensor.rekuperator_minimum_bypass_temperature
            name: Min. temp. bypass
          - type: tile
            entity: number.rekuperator_min_bypass_temperature
            name: Min. temp. bypass (nastawa)
          - type: tile
            entity: number.rekuperator_air_temperature_summer_free_heating
            name: Free Heating – próg
          - type: tile
            entity: number.rekuperator_air_temperature_summer_free_cooling
            name: Free Cooling – próg
          - type: tile
            entity: sensor.rekuperator_air_temperature_summer_free_heating
            name: Free Heating (odczyt)
          - type: tile
            entity: sensor.rekuperator_air_temperature_summer_free_cooling
            name: Free Cooling (odczyt)

  # ============================================================
  # WIDOK 3 – WENTYLACJA I GWC
  # ============================================================
  - title: Wentylacja
    path: ventilation
    icon: mdi:fan
    type: sections

    sections:

      # --- Aktualny stan ---
      - type: grid
        title: Aktualny przepływ
        cards:
          - type: gauge
            entity: sensor.rekuperator_supply_percentage
            name: Nawiew %
            min: 0
            max: 150
            needle: true
            severity:
              green: 40
              yellow: 80
              red: 100
          - type: gauge
            entity: sensor.rekuperator_exhaust_percentage
            name: Wywiew %
            min: 0
            max: 150
            needle: true
            severity:
              green: 40
              yellow: 80
              red: 100
          - type: tile
            entity: sensor.rekuperator_supply_flow_rate_m3_h
            name: Przepływ nawiewu
          - type: tile
            entity: sensor.rekuperator_exhaust_flow_rate_m3_h
            name: Przepływ wywiewu
          - type: tile
            entity: sensor.rekuperator_supply_air_flow
            name: Nawiew (rzeczywisty)
          - type: tile
            entity: sensor.rekuperator_exhaust_air_flow
            name: Wywiew (rzeczywisty)
          - type: tile
            entity: sensor.rekuperator_minimum_percentage
            name: Minimum %
          - type: tile
            entity: sensor.rekuperator_maximum_percentage
            name: Maksimum %

      # --- Nastawy przepływu ---
      - type: grid
        title: Nastawy przepływu
        cards:
          - type: tile
            entity: number.rekuperator_air_flow_rate_manual
            name: Intensywność – ręczna
          - type: tile
            entity: number.rekuperator_air_flow_rate_temporary
            name: Intensywność – tymczasowa
          - type: tile
            entity: number.rekuperator_nominal_supply_air_flow
            name: Nom. nawiew [m³/h]
          - type: tile
            entity: number.rekuperator_nominal_exhaust_air_flow
            name: Nom. wywiew [m³/h]
          - type: tile
            entity: number.rekuperator_max_supply_air_flow_rate
            name: Maks. nawiew %
          - type: tile
            entity: number.rekuperator_max_exhaust_air_flow_rate
            name: Maks. wywiew %
          - type: tile
            entity: sensor.rekuperator_nominal_supply_air_flow
            name: Nom. nawiew (odczyt)
          - type: tile
            entity: sensor.rekuperator_nominal_exhaust_air_flow
            name: Nom. wywiew (odczyt)

      # --- Historia przepływów ---
      - type: grid
        title: Historia przepływów (24h)
        cards:
          - type: history-graph
            title: Przepływy i wydajność
            hours_to_show: 24
            entities:
              - entity: sensor.rekuperator_supply_flow_rate_m3_h
                name: Nawiew
              - entity: sensor.rekuperator_exhaust_flow_rate_m3_h
                name: Wywiew
              - entity: sensor.rekuperator_heat_recovery_efficiency
                name: Sprawność

      # --- Napięcia sterujące (diagnostyka) ---
      - type: grid
        title: Napięcia sterujące
        cards:
          - type: tile
            entity: sensor.rekuperator_supply_fan_voltage
            name: Wentylator nawiewu
            icon: mdi:sine-wave
          - type: tile
            entity: sensor.rekuperator_exhaust_fan_voltage
            name: Wentylator wywiewu
            icon: mdi:sine-wave
          - type: tile
            entity: sensor.rekuperator_heater_voltage
            name: Nagrzewnica
            icon: mdi:sine-wave
          - type: tile
            entity: sensor.rekuperator_cooler_voltage
            name: Chłodnica
            icon: mdi:sine-wave

      # --- GWC (Gruntowy Wymiennik Ciepła) ---
      - type: grid
        title: GWC – Gruntowy Wymiennik Ciepła
        cards:
          - type: tile
            entity: sensor.rekuperator_gwc_mode
            name: Tryb GWC
          - type: tile
            entity: switch.rekuperator_gwc_off
            name: GWC aktywny
          - type: tile
            entity: select.rekuperator_gwc_regen
            name: Regeneracja GWC
          - type: tile
            entity: binary_sensor.rekuperator_gwc
            name: GWC (status)
          - type: tile
            entity: binary_sensor.rekuperator_gwc_regen_flag
            name: Regeneracja aktywna
          - type: tile
            entity: sensor.rekuperator_gwc_temperature
            name: Temperatura GWC
          - type: tile
            entity: number.rekuperator_min_gwc_air_temperature
            name: Min. temp. GWC
          - type: tile
            entity: number.rekuperator_max_gwc_air_temperature
            name: Maks. temp. GWC
          - type: tile
            entity: number.rekuperator_delta_t_gwc
            name: Delta T GWC
          - type: tile
            entity: number.rekuperator_gwc_regen_period
            name: Czas regeneracji [h]
          - type: tile
            entity: number.rekuperator_nominal_supply_air_flow_gwc
            name: Nawiew GWC [m³/h]
          - type: tile
            entity: number.rekuperator_nominal_exhaust_air_flow_gwc
            name: Wywiew GWC [m³/h]
          - type: tile
            entity: number.rekuperator_max_supply_air_flow_rate_gwc
            name: Maks. nawiew GWC %
          - type: tile
            entity: number.rekuperator_max_exhaust_air_flow_rate_gwc
            name: Maks. wywiew GWC %
          - type: tile
            entity: time.rekuperator_start_gwc_regen_summer_time
            name: Start regen. lato
          - type: tile
            entity: time.rekuperator_stop_gwc_regen_summer_time
            name: Stop regen. lato
          - type: tile
            entity: time.rekuperator_start_gwc_regen_winter_time
            name: Start regen. zima
          - type: tile
            entity: time.rekuperator_stop_gwc_regen_winter_time
            name: Stop regen. zima

      # --- ERV (dogrzewacz wtórny) ---
      - type: grid
        title: ERV – Dogrzewacz
        cards:
          - type: tile
            entity: select.rekuperator_cfg_post_heater_mode
            name: Tryb ERV
          - type: tile
            entity: binary_sensor.rekuperator_post_heater_on
            name: ERV aktywny

