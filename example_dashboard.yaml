            icon: mdi:fire-alert
            color: red
            grid_options:
              columns: 6
              rows: 2
          - type: tile
            entity: sensor.rekuperator_ahu_stop_alarm_code
            name: Kod zatrzymania AHU
            icon: mdi:stop-circle
            grid_options:
              columns: 6
              rows: 2
          - type: tile
            entity: binary_sensor.rekuperator_contamination_sensor
            name: Czujnik jakości powietrza
            icon: mdi:air-filter
            grid_options:
              columns: 4
          - type: tile
            entity: binary_sensor.rekuperator_duct_heater_protection
            name: Zabezpieczenie nagrzewnicy
            icon: mdi:thermometer-alert
            color: orange
            grid_options:
              columns: 4
          - type: tile
            entity: sensor.rekuperator_antifreeze_stage
            name: Stopień antyzamrożenia
            icon: mdi:snowflake-thermometer
            grid_options:
              columns: 4
      - type: grid
        cards:
          - type: heading
            heading: Kody błędów E – diagnostyka
          - type: tile
            entity: binary_sensor.rekuperator_e99_airpack_product_key_required
            grid_options:
              columns: 3
          - type: tile
            entity: binary_sensor.rekuperator_e100_outdoor_air_sensor_failure_tz1
            grid_options:
              columns: 3
          - type: tile
            entity: binary_sensor.rekuperator_e101_supply_air_sensor_failure_tn1
            grid_options:
              columns: 3
          - type: tile
            entity: binary_sensor.rekuperator_e102_exhaust_air_sensor_failure_tp
            grid_options:
              columns: 3
          - type: tile
            entity: binary_sensor.rekuperator_e103_hx_inlet_sensor_failure_tz2
            grid_options:
              columns: 3
          - type: tile
            entity: binary_sensor.rekuperator_e104_room_temp_sensor_failure_to
            grid_options:
