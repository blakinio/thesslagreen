# ─────────────────────────────────────────────────────────────
# WIDOK 5  USTAWIENIA
# ─────────────────────────────────────────────────────────────
  - title: Ustawienia
    path: settings
    icon: mdi:cog-outline
    type: sections

    sections:

      # ── Tryb pracy ─────────────────────────────────────────
      - type: grid
        title: Tryb pracy
        cards:

          - type: tile
            entity: switch.rekuperator_on_off_panel_mode
            name: Zasilanie systemu
            icon: mdi:power
            color: red
            grid_options:
              columns: 6

          - type: tile
            entity: select.rekuperator_mode
            name: Tryb pracy
            icon: mdi:tune
            grid_options:
              columns: 6

          - type: tile
            entity: select.rekuperator_season_mode
            name: Tryb sezonu
            icon: mdi:weather-partly-cloudy
            grid_options:
              columns: 6

          - type: tile
            entity: switch.rekuperator_comfort_mode_panel
            name: Tryb komfort
            icon: mdi:sofa
            color: purple
            grid_options:
              columns: 6

          - type: tile
            entity: select.rekuperator_bypass_user_mode
            name: Tryb bypass
            icon: mdi:pipe-valve
            grid_options:
              columns: 6

          - type: tile
            entity: select.rekuperator_gwc_regen
            name: Regeneracja GWC
            icon: mdi:autorenew
            grid_options:
              columns: 6

      # ── Nastawa temperatury i przepływu ────────────────────
      - type: grid
        title: Nastawy temperatury i przepływu
        cards:

          - type: tile
            entity: number.rekuperator_supply_air_temperature_manual
            name: Temp. nawiewu – ręczna [°C]
            icon: mdi:thermometer-plus
            grid_options:
              columns: 6

          - type: tile
            entity: number.rekuperator_air_flow_rate_manual
            name: Intensywność wentylacji – ręczna [%]
            icon: mdi:tune
            grid_options:
              columns: 6

          - type: tile
            entity: number.rekuperator_nominal_supply_air_flow
            name: Nom. nawiew [m³/h]
            icon: mdi:air-filter
            grid_options:
              columns: 6

          - type: tile
            entity: number.rekuperator_nominal_exhaust_air_flow
            name: Nom. wywiew [m³/h]
            icon: mdi:air-filter
            grid_options:
              columns: 6

          - type: tile
            entity: sensor.rekuperator_airing_coef
            name: Współczynnik wietrzenia (pokoje) [%]
            icon: mdi:percent
            grid_options:
              columns: 4

          - type: tile
            entity: sensor.rekuperator_airing_bathroom_coef
            name: Współczynnik wietrzenia (łazienka) [%]
            icon: mdi:percent
